name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  BUN_VERSION: "1"

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript compilation check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: notification_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d notification_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create Prisma mock for Jest
        run: |
          mkdir -p generated/prisma/__mocks__
          cat > generated/prisma/__mocks__/client.ts << 'MOCKEOF'
          // Mock for Prisma 7.x generated client used during Jest tests
          export class PrismaClient {
            $connect = jest.fn().mockResolvedValue(undefined);
            $disconnect = jest.fn().mockResolvedValue(undefined);
            user = { findUnique: jest.fn(), findMany: jest.fn(), create: jest.fn(), update: jest.fn(), delete: jest.fn() };
            notificationJob = { findUnique: jest.fn(), findMany: jest.fn(), create: jest.fn(), update: jest.fn(), delete: jest.fn() };
          }
          export const Prisma = {};
          MOCKEOF

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/notification_db?schema=public

      - name: Run unit tests
        run: bun test
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DATABASE_URL: postgresql://admin:password@localhost:5432/notification_db?schema=public

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: notification_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d notification_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create Prisma mock for Jest
        run: |
          mkdir -p generated/prisma/__mocks__
          cat > generated/prisma/__mocks__/client.ts << 'MOCKEOF'
          // Mock for Prisma 7.x generated client used during Jest tests
          export class PrismaClient {
            $connect = jest.fn().mockResolvedValue(undefined);
            $disconnect = jest.fn().mockResolvedValue(undefined);
            user = { findUnique: jest.fn(), findMany: jest.fn(), create: jest.fn(), update: jest.fn(), delete: jest.fn() };
            notificationJob = { findUnique: jest.fn(), findMany: jest.fn(), create: jest.fn(), update: jest.fn(), delete: jest.fn() };
          }
          export const Prisma = {};
          MOCKEOF

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://admin:password@localhost:5432/notification_db?schema=public

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DATABASE_URL: postgresql://admin:password@localhost:5432/notification_db?schema=public
          NODE_OPTIONS: "--experimental-vm-modules"
